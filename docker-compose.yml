services:
  app:
    build: .
    image: ${ECR_REPO:-claudewatch}:latest
    restart: unless-stopped
    env_file: .env
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - app_data:/app/data
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - app

volumes:
  app_data:

networks:
  internal:
